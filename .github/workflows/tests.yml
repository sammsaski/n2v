name: Run Tests

on:
  push:
    branches: [ main, master, unittesting ]
  pull_request:
    branches: [ main, master, unittesting ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        
    - name: Run zonotope basic operations tests
      run: |
        python -m pytest tests/test_zono_basic_operations.py -v --tb=short
        
    - name: Run all tests
      run: |
        python -m pytest tests/ -v --tb=short --ignore=tests/intro_examples/
        
    - name: Generate coverage report
      if: matrix.python-version == '3.11'
      run: |
        python -m pytest tests/test_zono_basic_operations.py --cov=n2v --cov-report=xml --cov-report=term
        
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-n2v
        fail_ci_if_error: false
